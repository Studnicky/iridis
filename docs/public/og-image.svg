<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" role="img" aria-label="iridis — chromatic pipeline for dynamic palettes">

  <defs>
    <!-- Dark purple-to-near-black gradient — mirrors the iridis brand -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1a0533"/>
      <stop offset="0.5" stop-color="#130426"/>
      <stop offset="1"   stop-color="#0c0218"/>
    </linearGradient>

    <!-- Purple accent glow behind the logo -->
    <radialGradient id="logoGlow" cx="220" cy="315" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="1"   stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle right-edge accent to separate text zone -->
    <linearGradient id="rightAccent" x1="500" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#4c1d95" stop-opacity="0.06"/>
      <stop offset="1"   stop-color="#7c3aed" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="glowFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 800;
        letter-spacing: -0.03em;
        fill: #f5f3ff;
      }
      .tagline {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 400;
        letter-spacing: 0.01em;
        fill: #c4b5fd;
        opacity: 0.90;
      }
      .meta {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-weight: 500;
        fill: #a78bfa;
        opacity: 0.65;
      }
      .divider {
        stroke: #7c3aed;
        stroke-opacity: 0.35;
        stroke-width: 1.5;
      }
      /* Palette swatch dots */
      .swatch { opacity: 0.88; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bgGradient)"/>
  <!-- Subtle right-zone overlay -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#rightAccent)"/>
  <!-- Logo glow halo -->
  <ellipse cx="220" cy="315" rx="250" ry="250" fill="url(#logoGlow)"/>

  <!-- Logo — embedded vector icon (self-contained, mirrors favicon.svg) so the SVG renders correctly standalone (GitHub social preview, link unfurls). -->
  <g filter="url(#logoShadow)">
    <svg x="0" y="75" width="440" height="440" viewBox="0 0 1254 1254" preserveAspectRatio="xMidYMid meet" style="--iridis-speed-slow:28s;--iridis-speed-medium:14s;--iridis-speed-fast:7s;--iridis-opacity-fidelity:1;--iridis-opacity-chromatic-zones:0;--iridis-opacity-graph:0.78;--iridis-opacity-rings:0.72;--iridis-hue-rotate:0deg;--iridis-saturation:1.08;--iridis-brightness:1">
      <defs>
        <filter id="iridis-node-glow" width="260%" height="260%" x="-80%" y="-80%"><feGaussianBlur result="blur" stdDeviation="5"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="iridis-soft-glow" width="190%" height="190%" x="-45%" y="-45%"><feGaussianBlur result="blur" stdDeviation="7"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="iridis-core-glow" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#dfffff" stop-opacity=".5"/><stop offset="24%" stop-color="#00d7ff" stop-opacity=".22"/><stop offset="56%" stop-color="#894cff" stop-opacity=".13"/><stop offset="100%" stop-opacity="0"/></radialGradient>
        <style>@keyframes iridis-spin{to{transform:rotate(360deg)}}@keyframes iridis-dash{to{stroke-dashoffset:-100}}.scale-zone{opacity:.35;transition:opacity 240ms ease,fill 240ms ease}.graph-edge,.trajectory-ring{fill:none;stroke-width:1.8;stroke-linecap:round}.trajectory-ring{stroke-dasharray:9 13;animation:iridis-dash var(--iridis-speed-medium) linear infinite}.graph-edge{stroke:#0edcff;stroke-dasharray:7 9;opacity:.62;animation:iridis-dash var(--iridis-speed-fast) linear infinite}.graph-node{stroke:#eaffff;stroke-width:1.6;filter:url(#iridis-node-glow);transform-box:fill-box;transform-origin:center}.graph-node-cyan{fill:#00e5ff}.graph-node-blue{fill:#1979ff}.graph-node-violet{fill:#8657ff}.graph-node-magenta{fill:#ff35d3}.graph-node-amber{fill:#ffb83d}.graph-node-emerald{fill:#3cff9e}.graph-node-teal{fill:#00ffe2}.iris-curve{fill:none;stroke-linecap:round;filter:url(#iridis-soft-glow)}</style>
      </defs>
      <g><path d="M0 0h1254v1254H0z" style="fill:transparent"/><g data-layer-role="semantic-color-fields" style="opacity:var(--iridis-opacity-chromatic-zones);mix-blend-mode:screen;filter:url(#iridis-soft-glow)"><path fill="#00d7ff" d="M165 503c57-228 273-315 414-270-86 101-132 192-158 274-90-14-173-9-256-4" class="scale-zone"/><path fill="#31ff9a" d="M265 354c90-139 276-188 414-129-77 45-156 91-209 173-71-20-139-33-205-44" class="scale-zone"/><path fill="#8657ff" d="M463 226c154-77 332-2 423 160-127-27-259-36-376 12-15-68-29-123-47-172" class="scale-zone"/><path fill="#ff35d3" d="M611 384c136-43 275-7 350 129-103 14-215 16-327-3-3-46-11-88-23-126" class="scale-zone"/><path fill="#ffb33f" d="M639 518c110 19 218 12 318 2-74 165-213 279-378 285 32-88 53-184 60-287" class="scale-zone"/><path fill="#00ffe2" d="M165 520c100-4 183 0 260 19 21 94 76 175 153 266-180 1-341-117-413-285" class="scale-zone"/><path fill="#4435ff" d="M374 627c70.84-118 435.16-118 506 0-70.84 118-435.16 118-506 0" class="scale-zone"/></g><g data-layer-role="animatable-oklch-trajectory-arcs" style="opacity:var(--iridis-opacity-rings);transform-box:fill-box;transform-origin:center;animation:iridis-spin var(--iridis-speed-slow) linear infinite"><path d="M189 627a438 438 0 1 0 876 0 438 438 0 1 0-876 0" class="trajectory-ring" pathLength="100" style="stroke:#00d7ff"/><path d="M156 627a471 471 0 1 0 942 0 471 471 0 1 0-942 0" class="trajectory-ring" pathLength="100" style="stroke:#a04dff"/><path d="M124 627a503 503 0 1 0 1006 0 503 503 0 1 0-1006 0" class="trajectory-ring" pathLength="100" style="stroke:#ffb83d"/></g><g data-layer-role="animatable-color-role-graph" style="opacity:var(--iridis-opacity-graph);filter:url(#iridis-node-glow)"><g><path d="M1109 627q-482 0-122.36 286.81" class="graph-edge"/><path d="M1041.45 826.59Q627 627 826.59 1041.45" class="graph-edge"/><path d="M927.52 1003.84Q627 627 627 1087" class="graph-edge"/><path d="M729.36 1075.47Q627 627 427.41 1041.45" class="graph-edge"/><path d="M519.74 1096.92Q627 627 267.36 913.81" class="graph-edge"/><path d="M340.19 986.64Q627 627 178.53 729.36" class="graph-edge"/><path d="M192.73 836.13Q627 627 178.53 524.64" class="graph-edge"/><path d="M167 627q460 0 100.36-286.81" class="graph-edge"/><path d="M192.73 417.87Q627 627 427.41 212.55" class="graph-edge"/><path d="M340.19 267.36Q627 627 627 167" class="graph-edge"/><path d="M519.74 157.08Q627 627 826.59 212.55" class="graph-edge"/><path d="M729.36 178.53Q627 627 986.64 340.19" class="graph-edge"/><path d="M927.52 250.16Q627 627 1075.47 524.64" class="graph-edge"/><path d="M1041.45 427.41Q627 627 1075.47 729.36" class="graph-edge"/></g><g><circle cx="1109" cy="627" r="8" class="graph-node graph-node-cyan"/><circle cx="1075.47" cy="729.36" r="10" class="graph-node graph-node-blue"/><circle cx="1041.45" cy="826.59" r="12" class="graph-node graph-node-violet"/><circle cx="986.64" cy="913.81" r="8" class="graph-node graph-node-magenta"/><circle cx="927.52" cy="1003.84" r="10" class="graph-node graph-node-amber"/><circle cx="826.59" cy="1041.45" r="12" class="graph-node graph-node-emerald"/><circle cx="729.36" cy="1075.47" r="8" class="graph-node graph-node-teal"/><circle cx="627" cy="1087" r="10" class="graph-node graph-node-cyan"/><circle cx="519.74" cy="1096.92" r="12" class="graph-node graph-node-blue"/><circle cx="427.41" cy="1041.45" r="8" class="graph-node graph-node-violet"/><circle cx="340.19" cy="986.64" r="10" class="graph-node graph-node-magenta"/><circle cx="267.36" cy="913.81" r="12" class="graph-node graph-node-amber"/><circle cx="192.73" cy="836.13" r="8" class="graph-node graph-node-emerald"/><circle cx="178.53" cy="729.36" r="10" class="graph-node graph-node-teal"/><circle cx="167" cy="627" r="12" class="graph-node graph-node-cyan"/><circle cx="178.53" cy="524.64" r="8" class="graph-node graph-node-blue"/><circle cx="192.73" cy="417.87" r="10" class="graph-node graph-node-violet"/><circle cx="267.36" cy="340.19" r="12" class="graph-node graph-node-magenta"/><circle cx="340.19" cy="267.36" r="8" class="graph-node graph-node-amber"/><circle cx="427.41" cy="212.55" r="10" class="graph-node graph-node-emerald"/><circle cx="519.74" cy="157.08" r="12" class="graph-node graph-node-teal"/><circle cx="627" cy="167" r="8" class="graph-node graph-node-cyan"/><circle cx="729.36" cy="178.53" r="10" class="graph-node graph-node-blue"/><circle cx="826.59" cy="212.55" r="12" class="graph-node graph-node-violet"/><circle cx="927.52" cy="250.16" r="8" class="graph-node graph-node-magenta"/><circle cx="986.64" cy="340.19" r="10" class="graph-node graph-node-amber"/><circle cx="1041.45" cy="427.41" r="12" class="graph-node graph-node-emerald"/><circle cx="1075.47" cy="524.64" r="8" class="graph-node graph-node-teal"/></g></g><g data-layer-role="subtle-eye-indicated-by-scale-flow" style="opacity:.6;mix-blend-mode:screen"><path d="M150 512c140-146 588-146 734 0" class="iris-curve" style="stroke:#00e5ff;stroke-width:2.5"/><path d="M150 512c144 146 588 146 734 0" class="iris-curve" style="stroke:#ff35d3;stroke-width:2.2"/><ellipse cx="627" cy="627" rx="205" ry="100" style="fill:url(#iridis-core-glow);opacity:.55"/></g></g>
    </svg>
  </g>

  <!-- Vertical divider -->
  <line x1="470" y1="80" x2="470" y2="550" class="divider"/>

  <!-- Text zone: right of divider -->
  <g transform="translate(510, 170)">
    <!-- Project name -->
    <text class="title" x="0" y="0" font-size="96">iridis</text>

    <!-- Tagline, two lines -->
    <text class="tagline" x="0" y="68" font-size="28">chromatic pipeline</text>
    <text class="tagline" x="0" y="104" font-size="28">for dynamic palettes</text>

    <!-- Palette swatch row — five OKLCH-inspired colours -->
    <g transform="translate(0, 152)">
      <circle class="swatch" cx="14"  cy="14" r="14" fill="#ef4444"/>
      <circle class="swatch" cx="52"  cy="14" r="14" fill="#f97316"/>
      <circle class="swatch" cx="90"  cy="14" r="14" fill="#eab308"/>
      <circle class="swatch" cx="128" cy="14" r="14" fill="#22c55e"/>
      <circle class="swatch" cx="166" cy="14" r="14" fill="#3b82f6"/>
      <circle class="swatch" cx="204" cy="14" r="14" fill="#7c3aed"/>
      <circle class="swatch" cx="242" cy="14" r="14" fill="#ec4899"/>
    </g>

    <!-- Meta line -->
    <text class="meta" x="0" y="238" font-size="20">OKLCH-native · contrast-enforced · pluggable</text>
  </g>
</svg>
